server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
            allowed-methods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
          predicates:
            - Path=/api/auth/**
        - id: todo-service-todos
          uri: http://${TODO_SERVICE_HOST:localhost}:${TODO_SERVICE_PORT:8082}
          predicates:
            - Path=/api/todos/**
        - id: todo-service-categories
          uri: http://${TODO_SERVICE_HOST:localhost}:${TODO_SERVICE_PORT:8082}
          predicates:
            - Path=/api/categories/**
        - id: todo-service-tags
          uri: http://${TODO_SERVICE_HOST:localhost}:${TODO_SERVICE_PORT:8082}
          predicates:
            - Path=/api/tags/**
        - id: todo-service-templates
          uri: http://${TODO_SERVICE_HOST:localhost}:${TODO_SERVICE_PORT:8082}
          predicates:
            - Path=/api/templates/**
        - id: todo-service-dashboard
          uri: http://${TODO_SERVICE_HOST:localhost}:${TODO_SERVICE_PORT:8082}
          predicates:
            - Path=/api/dashboard/**
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${TODO_AUTH_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-secret-2026}
