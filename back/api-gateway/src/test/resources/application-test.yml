server:
  port: 0

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
            allowed-methods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: todo-service-todos
          uri: http://localhost:59999
          predicates:
            - Path=/api/todos/**
        - id: auth-service
          uri: http://localhost:59999
          predicates:
            - Path=/api/auth/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-2026
