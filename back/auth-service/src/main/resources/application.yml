server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:todo}
    username: ${DB_USERNAME:yangyag}
    password: ${DB_PASSWORD:yangyag1!}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${TODO_AUTH_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-secret-2026}
    access-token-expiration: 15m
    refresh-token-expiration: 7d
