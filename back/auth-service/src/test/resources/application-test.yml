spring:
  datasource:
    url: jdbc:h2:mem:auth_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-2026
    access-token-expiration: 15m
    refresh-token-expiration: 7d
